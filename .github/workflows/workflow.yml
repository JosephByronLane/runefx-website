name: Docker Build & Upload

on:
  push:
    branches:
      #change this to main later, bruh
      - dev


jobs:

  # Build and push the Docker image to Docker Hub
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Log in to Docker Hub using secrets stored in GitHub
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build the Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/runefx-website .

      # Push the Docker image to Docker Hub
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/runefx-website

  # AWS EC2 Deployment
  deploy:
    name: Deploy to AWS EC2
    needs: build
    runs-on: self-hosted
    steps:
      - name: Log in to Docker Hub
        run: echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Pull and Run Docker Image

        #if shit dont work add sudo
        run: |        
          docker pull your-dockerhub-username/your-repo-name:latest
          docker stop your-container-name || true
          docker rm your-container-name || true
          docker run -d --name runefx-website -p 80:80 joemama7/runefx-website:latest